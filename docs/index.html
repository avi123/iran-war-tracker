const trendColor = { "failing":"#EF4444", "expanding":"#F59E0B" };
const trendLabel = { "failing":"FAILING", "expanding":"EXPANDING" };

const StatusBadge = ({ status, trend }) => {
  const c = statusColor[status] || C.gray;
  return <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>

  return (

          display:"grid", gridTemplateColumns:"minmax(260px,2fr) 80px 70px 130px 130px minmax(180px,1.5fr) 90px",

function IranWarGoalsTracker() {
  const [expanded, setExpanded] = useState(() => {
    const init = {};
    GOALS.forEach(g => { init[g.id] = false; });
    return init;
  });
  const [filter, setFilter] = useState("all");
  const [expandAll, setExpandAll] = useState(false);

  const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const toggleAll = () => {
    const next = !expandAll;
    setExpandAll(next);
    const newExp = {};
    GOALS.forEach(g => { newExp[g.id] = next; });
    setExpanded(newExp);
  };

  const filtered = filter === "all" ? GOALS : GOALS.filter(g => {
    if (filter === "atrisk") return g.status === "at risk";
    if (filter === "failing") return g.trend === "failing" || (g.subgoals && g.subgoals.some(sg => sg.trend === "failing"));
    if (filter === "expanding") return g.trend === "expanding" || (g.subgoals && g.subgoals.some(sg => sg.trend === "expanding"));
    if (filter === "achieved") return g.status === "achieved";
    if (filter === "unachievable") return g.status === "unachievable";
    if (filter === "opposing") return g.party === "opposing";
    return g.party === filter;
  });

  const countAll = (goals) => {
    let all = [];
    const collect = (list) => { list.forEach(g => { all.push(g); if (g.subgoals) collect(g.subgoals); }); };
    collect(goals);
    return all;
  };
  const allGoals = countAll(GOALS);

  const stats = {
    total: allGoals.length,
    achieved: allGoals.filter(g => g.status === "achieved").length,
    inProgress: allGoals.filter(g => g.status === "in progress").length,
    atRisk: allGoals.filter(g => g.status === "at risk").length,
    failing: allGoals.filter(g => g.trend === "failing").length,
    expanding: allGoals.filter(g => g.trend === "expanding").length,
    unachievable: allGoals.filter(g => g.status === "unachievable").length,
    tbd: allGoals.filter(g => g.status === "tbd").length,
  };

  return (
    <div style={{ background:C.bg, minHeight:"100vh", fontFamily:"'SF Mono',SFMono-Regular,Menlo,Consolas,monospace" }}>
      {/* HEADER */}
      <div style={{ background:`linear-gradient(135deg, ${C.navy} 0%, #0E1A30 100%)`, padding:"20px 24px 16px", borderBottom:`2px solid ${C.blue}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ fontSize:10, color:C.textDim, letterSpacing:3, textTransform:"uppercase", marginBottom:4 }}>Two Generals Framework</div>
            <h1 style={{ color:C.white, fontSize:20, fontWeight:800, margin:0, letterSpacing:-0.5 }}>Iran War Goals Assessment</h1>
            <div style={{ fontSize:11, color:C.textDim, marginTop:4 }}>
              <span style={{color:C.us}}>■</span> Gen. Caine (CJCS/CENTCOM) &nbsp;
              <span style={{color:C.israel}}>■</span> IDF Chief Halevi &nbsp;
              <span style={{color:C.purple}}>■</span> Shared &nbsp;
              <span style={{color:C.oppose}}>■</span> Opposing &nbsp;|&nbsp; Day 7 — Hour 180 — March 6, 2026 — Afternoon Update
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {[
              { label:"ACHIEVED", value:stats.achieved, color:C.green },
              { label:"IN PROGRESS", value:stats.inProgress, color:C.amber },
              { label:"AT RISK", value:stats.atRisk, color:C.red, sub:`${stats.failing}F ${stats.expanding}E` },
              { label:"UNACHIEVABLE", value:stats.unachievable, color:C.gray },
              { label:"TBD", value:stats.tbd, color:C.gray },
            ].map(s => (
              <div key={s.label} style={{ background:C.card, borderRadius:8, padding:"8px 10px", border:`1px solid ${C.border}`, textAlign:"center", minWidth:60 }}>
                <div style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:8, color:C.textDim, letterSpacing:0.8 }}>{s.label}</div>
                {s.sub && <div style={{ fontSize:8, color:C.textDim, marginTop:2, letterSpacing:0.3 }}>{s.sub}</div>}
              </div>
            ))}
          </div>
        </div>

            { title:"War Duration & Escalation", us:"Senate War Powers DEFEATED 47-53. House vote Thursday. Hegseth: 8 weeks, 'very early.' Pentagon requesting critical minerals. Defense execs at WH Friday. IRGC hit US oil tanker Day 6. Missile decline 86% but IRGC promises escalation.", israel:"Entering PHASE 2 — shifting to deep underground missile bunkers (Haaretz). Phase 1 surface targets largely complete. IDF ordered Dahiyeh evacuation. Radwan force deployed against IDF tanks. F-35 air-to-air kill. No wind-down.", risk:"Phase 2 = campaign deepening, not concluding. Underground targets are harder, take longer, require heavier munitions. IRGC adapting to asymmetric warfare (small craft, drone boats, ground forces). Russia confirms Iran hasn't requested weapons — YET. The 86% missile decline is genuine degradation (FDD/UAE data) but IRGC promises escalation. Watch Day 7-8 for whether decline reverses." },

            { title:"Civilian Casualties", us:"Iran: 1,097+ (HRANA) including 168 children. CBS satellite analysis: Minab school 60m from IRGC barracks — military compound also destroyed. Pattern: proximity targeting. US: 'wouldn't deliberately target.' Neither side claiming responsibility.", israel:"IDF ordered Dahiyeh evacuation — major Beirut strikes imminent. Lebanon: 77 dead, 527 wounded, family of 4 wiped out, 7 children in 24hrs. Phase 2 underground strikes may reduce surface civilian exposure — or drive munitions into populated areas.", risk:"Multi-theater toll approaching 1,250+ across 8+ countries. Azerbaijan now hit (drones near school). Lebanon casualties accelerating. Iran blackout prevents accurate counting. CBS satellite imagery emerging as primary BDA tool — showing military targets adjacent to civilian sites. The 'precision' narrative depends entirely on how you define the blast radius." },
            { title:"Hormuz vs. Global Shipping", us:"Strait upgraded to WARLIKE OPERATIONS AREA — highest designation, crew right of refusal. IRGC hit US tanker. Kuwait tanker explosion (oil spill). Oman storage hit. DFC insurance in 'infancy.' Macron building European naval coalition for Strait protection — separate from US command.", israel:"Phase 2 underground targeting. Dahiyeh evacuation ordered. Hezbollah Radwan deployed. Hormuz remains US problem — Israel focused on Lebanon + Tehran.", risk:"Drone volume SURGING (131 at UAE Day 6) even as missiles decline 86%. Iran shifting to cheaper, more producible weapon system. Campaign succeeding against missiles but struggling against drones. Warlike ops designation = legal/institutional closure layered on physical/insurance closure. Macron's separate Strait coalition could help OR could create competing command structures." },
            { title:"Alliance Management", us:"CIA backchannel exists but US DISMISSED Iranian messages as 'bull****' (Ravid direct source) — less real than markets priced. Trump demanding role in choosing Iran's leader. France authorized US base access. Spain REVERSED — sending best frigate to Cyprus. Zelenskyy proposed weapons swap: Ukrainian interceptor drones for PAC missiles. Italy sending destroyer but defense minister said strikes 'violated international law.' IDF: 20,000 reservists, 35 battalions.", israel:"Netanyahu called WH demanding answers on Iran contacts. Operating independently — Phase 2 underground + Dahiyeh evacuation. Vowing to kill Mojtaba. 810 Brigade expanding Lebanon ground positions (10+ controlling points).", risk:"Alliance EXPANDING militarily (Spain, France, Italy, Greece, UK, Germany + Ukraine offering weapons) while FRACTURING politically (Netanyahu suspicious, Trump 'MIGA' puppet model, Italy calling strikes illegal, no agreed endgame). Spain's reversal shows Trump pressure works on allies. But the more nations drawn in = the harder it becomes to stop. Macron building Strait coalition separate from US command." },

          {[
            { name:"Kosovo 1999", fit:"HIGH", fitColor:C.green, note:"Air campaign alone forced political outcome. No ground troops. NATO unity strained but held. ~78 days. Key parallel: sustained air pressure changed regime calculus without invasion. Key difference: Milosevic was rational actor with defined territory to concede; Iran's IRGC has no Kosovo to give up." },

        <div style={{ background:C.card, borderRadius:8, padding:18, border:`1px solid ${C.border}`, borderLeft:`4px solid #F59E0B` }}>
          <h3 style={{ color:"#F59E0B", fontSize:14, fontWeight:700, marginBottom:8 }}>The Case That This Is Expanding — Day 7</h3>
          <p style={{ color:C.text, fontSize:13, lineHeight:1.65, marginBottom:8 }}>
            <span style={{color:"#F59E0B",fontWeight:700}}>{stats.expanding} goals growing beyond plan</span>. Trump demands "unconditional surrender." CENTCOM planning 100 days. CSIS: <span style={{color:"#F59E0B",fontWeight:700}}>$891M/day, $3.5B unbudgeted in first 100 hours alone</span>. If 100-day war: ~$62B total. Second school hit (Tehran Niloufar Square). UNICEF: 181 children killed. IDF issuing Gaza-style evacuation orders inside Iran (Qom). 500,000-person Beirut evacuation. Smotrich: "Dahieh will look like Khan Younis." Day 7 most intense bombing yet. The war is expanding in cost, duration, civilian toll, geographic scope, and ambition simultaneously.

          <p style={{ color:C.text, fontSize:13, lineHeight:1.65, margin:0 }}>
